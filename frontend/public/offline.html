<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — SALTEDHASH</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f3f4f6; }
    .card { text-align: center; padding: 2.5rem; background: white; border-radius: 1rem; box-shadow: 0 4px 16px rgba(0,0,0,0.1); max-width: 360px; width: 90%; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { color: #1f2937; font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #6b7280; font-size: 0.95rem; line-height: 1.5; margin-bottom: 1.5rem; }
    button { padding: 0.75rem 2rem; background: #4f46e5; color: white; border: none; border-radius: 0.5rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>No internet connection found. Check your connection and try again. Your drafts are saved locally.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
